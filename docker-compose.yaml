services:
  influxdb:
    image: influxdb:2.7
    container_name: pvmonitor-influxdb
    ports:
      - "8086:8086"
    volumes:
      - /mnt/ssd/influxdb:/var/lib/influxdb2
    # environment: — only needed for first-time setup, remove after InfluxDB is initialized
    # to prevent data loss on restart. Uncomment to re-initialize:
    # environment:
    #   DOCKER_INFLUXDB_INIT_MODE: setup
    #   DOCKER_INFLUXDB_INIT_USERNAME: admin
    #   DOCKER_INFLUXDB_INIT_PASSWORD: pvmonitor123
    #   DOCKER_INFLUXDB_INIT_ORG: pvmonitor
    #   DOCKER_INFLUXDB_INIT_BUCKET: raw
    #   DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: pvmonitor-dev-token
    restart: unless-stopped

  backend:
    build: .
    container_name: pvmonitor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config   # mount config dir so users.yaml and config.yaml can be edited without rebuild
    environment:
      PV_INFLUX_TOKEN: ${PV_INFLUX_TOKEN}
      PV_JWT_SECRET: ${PV_JWT_SECRET}
    depends_on:
      - influxdb
    restart: unless-stopped
    network_mode: host   # needed for Modbus/MQTT access to local network devices on the Pi

